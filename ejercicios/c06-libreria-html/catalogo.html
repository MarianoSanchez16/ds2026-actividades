<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-light border-bottom">
        <div class="container-fluid">
            <a href="index.html" class="navbar-brand">Mi librería</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a href="index.html" class="nav-link">Inicio</a></li>
                    <li class="nav-item"><a href="catalogo.html" class="nav-link">Catálogo</a></li>
                    <li class="nav-item"><a href="contacto.html" class="nav-link">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <h1 class="text-center mb-4">Catálogo de libros</h1>

        <div class="row justify-content-center mb-5">
            <div class="col-md-8">
                <div class="input-group input-group-lg shadow-sm">
                    <input type="text" id="inputBusqueda" class="form-control" placeholder="Buscar por título o por autor">
                    <button class="btn btn-primary" id="botonBuscar">Buscar</button>
                </div>

                <div id="mensajeError" class="text-danger mt-2 fw-bold" style="display: none;"></div>
                <div id="mensajeCargando" class="text-primary mt-2 fw-bold" style="display: none;">Buscando libros...</div>
            </div>
        </div>

        <div class="row g-4" id="contenedorResultados">

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"></script>
    <script type="module" src="js/data.js"></script>
