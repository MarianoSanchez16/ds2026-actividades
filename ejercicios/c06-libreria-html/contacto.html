<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-light border-bottom">
        <div class="container-fluid">
            <a href="index.html" class="navbar-brand">Mi librería</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a href="index.html" class="nav-link">Inicio</a></li>
                    <li class="nav-item"><a href="catalogo.html" class="nav-link">Catálogo</a></li>
                    <li class="nav-item"><a href="contacto.html" class="nav-link">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                
                <h1 class="text-center mb-4">Contacto</h1>
                <p class="text-center text-muted mb-4">¿Tienes alguna duda o sugerencia? Escríbenos.</p>

                <form id="formularioContacto" class="card shadow-sm p-4">
                    
                    <div class="mb-3">
                        <label for="inputNombre" class="form-label fw-bold">Nombre</label>
                        <input type="text" id="inputNombre" class="form-control" placeholder="Ej: Juan Pérez" required>
                    </div>

                    <div class="mb-3">
                        <label for="inputEmail" class="form-label fw-bold">Email</label>
                        <input type="email" id="inputEmail" class="form-control" placeholder="usuario@ejemplo.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="inputAsunto" class="form-label fw-bold">Asunto</label>
                        <select id="inputAsunto" class="form-select" required>
                            <option value="">-- Seleccione una opción --</option>
                            <option value="Consulta">Consulta</option>
                            <option value="Reclamo">Reclamo</option>
                            <option value="Sugerencia">Sugerencia</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="inputMensaje" class="form-label fw-bold">Mensaje</label>
                        <textarea id="inputMensaje" class="form-control" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Enviar Mensaje</button>
                    </div>

                </form>

                <div id="mensajeExito" class="alert alert-success mt-4 text-center" style="display: none;">
                    ¡Mensaje enviado con éxito! Nos contactaremos a la brevedad.
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"></script>
    <script type="module" src="js/data.js"></script>
</body>
</html>
